<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login — Messenger</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1a1a2e; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card { background: #16213e; border-radius: 16px; padding: 40px; width: 100%; max-width: 380px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        .login-header { text-align: center; margin-bottom: 32px; }
        .login-header .logo { font-size: 40px; margin-bottom: 12px; }
        .login-header h1 { font-size: 22px; font-weight: 700; color: #fff; }
        .login-header p { font-size: 13px; color: #8899aa; margin-top: 6px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 13px; font-weight: 600; color: #8899aa; margin-bottom: 8px; }
        .form-group input { width: 100%; padding: 12px 16px; background: #0f3460; border: 1px solid #1a4a8a; border-radius: 8px; color: #fff; font-size: 14px; outline: none; transition: border-color 0.2s; }
        .form-group input:focus { border-color: #e94560; }
        .form-group input::placeholder { color: #4a6080; }
        .error-msg { background: rgba(233,69,96,0.15); border: 1px solid rgba(233,69,96,0.4); border-radius: 8px; padding: 10px 14px; font-size: 13px; color: #e94560; margin-bottom: 20px; }
        .btn-login { width: 100%; padding: 13px; background: #e94560; border: none; border-radius: 8px; color: white; font-size: 15px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
        .btn-login:hover { background: #c73652; }
        .footer-text { text-align: center; font-size: 12px; color: #4a6080; margin-top: 24px; }
    </style>
</head>
<body>
<div class="login-card">
    <div class="login-header">
        <div class="logo">💬</div>
        <h1>Messenger Admin</h1>
        <p>Sign in to manage your platform</p>
    </div>

    {% if error %}
    <div class="error-msg">⚠️ {{ error }}</div>
    {% endif %}

    <form method="post" action="/admin/login">
        <div class="form-group">
            <label>Username</label>
            <input type="text" name="username" placeholder="Enter username" required autofocus>
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" placeholder="Enter password" required>
        </div>
        <button type="submit" class="btn-login">Sign In</button>
    </form>

    <p class="footer-text">Messenger Backend Admin Panel</p>
</div>
</body>
</html>
